services:
  - type: web
    name: cake-shop-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # User must provide this in Render Dashboard
      - key: JWT_SECRET
        value: false
      - key: JWT_EXPIRES_IN
        value: false
      - key: ALLOWED_ORIGINS
        value: "*" # Update this with your frontend URLs later
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "Cake Shop <noreply@cakeshop.com>"
      - key: DOMAIN_SEND_EMAIL
        sync: false # Update this with your frontend URL
